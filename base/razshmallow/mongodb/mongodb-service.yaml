---
# MongoDB Service (ClusterIP) - for internal access
apiVersion: v1
kind: Service
metadata:
  name: mongodb-razshmallow
  namespace: razshmallow
  labels:
    app: mongodb-razshmallow
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 27017
    targetPort: 27017
    protocol: TCP
    name: mongodb
  selector:
    app: mongodb-razshmallow

---
# MongoDB Service (NodePort) - for external access via node IP
# Using 32018 to avoid colliding with the kirtus deployment (32017).
apiVersion: v1
kind: Service
metadata:
  name: mongodb-razshmallow-nodeport
  namespace: razshmallow
  labels:
    app: mongodb-razshmallow
spec:
  type: NodePort
  selector:
    app: mongodb-razshmallow
  ports:
  - name: mongodb
    port: 27017
    targetPort: 27017
    protocol: TCP
    nodePort: 32018

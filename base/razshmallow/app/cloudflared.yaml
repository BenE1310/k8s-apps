# Cloudflare Tunnel agent. Uses a remotely-managed (token) tunnel: the public
# hostname → service routing is configured in the Cloudflare Zero Trust dashboard
# (see deploy/README.md), so this just runs the connector with the token.
#
# Routes to configure in the dashboard for hostname razshmallow.site:
#   /api/*  → http://razshmallow-backend.razshmallow.svc.cluster.local:4000
#   (catch) → http://razshmallow-frontend.razshmallow.svc.cluster.local:80
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: razshmallow
  labels:
    app: cloudflared
    project: razshmallow
spec:
  replicas: 2          # 2 connectors → HA, zero-downtime restarts
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
        project: razshmallow
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.10.0
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "200m"

# Non-secret backend config. Secrets (Mongo URI, JWT, SMTP pass, MinIO keys)
# live in the Secret (see secret.example.yaml) — NOT here, NOT in git.
apiVersion: v1
kind: ConfigMap
metadata:
  name: razshmallow-backend-config
  namespace: razshmallow
  labels:
    app: razshmallow-backend
    project: razshmallow
data:
  NODE_ENV: "production"
  PORT: "4000"
  # Same-origin in prod (frontend + API both on razshmallow.site via the tunnel).
  CORS_ORIGIN: "https://razshmallow.site"
  # Base URL for links in outbound email (e.g. invitation links). Must be the real
  # frontend origin — CORS_ORIGIN can't stand in for it (it's "*" in dev). Defaults
  # to http://localhost:5173 if unset, which would point invite links at localhost.
  APP_URL: "https://razshmallow.site"
  JWT_EXPIRES_IN: "7d"
  # 0 = send real OTP/notification email (Gmail relay has a daily cap — mind load).
  # Set to 1 to disable outbound mail (codes print to the pod log instead).
  MAIL_DISABLE: "0"
  STORAGE_PROVIDER: "minio"
  MAX_UPLOAD_BYTES: "26214400"
  # In-cluster MinIO (namespace minio, service minio).
  MINIO_ENDPOINT: "minio.minio.svc.cluster.local"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_BUCKET: "razshmallow-attachments"
  MINIO_REGION: "us-east-1"
  # Brevo SMTP relay — STARTTLS on 587 (SMTP_SECURE=false). Login + key are in
  # the Secret. SMTP_FROM_ADDRESS must be a sender verified in Brevo.
  SMTP_HOST: "smtp-relay.brevo.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_FROM_NAME: "Razshmallow"
  SMTP_FROM_ADDRESS: "noreply@razshmallow.site"

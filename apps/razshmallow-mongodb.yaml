apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: razshmallow-mongodb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bene1310/k8s-apps
    targetRevision: HEAD
    path: base/razshmallow/mongodb
  destination:
    server: https://kubernetes.default.svc
    namespace: razshmallow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
